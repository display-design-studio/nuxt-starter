services:
  bun:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: template-bun
    working_dir: /app
    user: bun
    volumes:
      - ./:/app:Z
      - bun_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:3000:3000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    init: true
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      # NODE_TLS_REJECT_UNAUTHORIZED: "0"
    command: sh -lc 'exec bun run dev --host 0.0.0.0 --port 3000'

volumes:
  bun_node_modules:
